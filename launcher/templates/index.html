<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8; --surface: #ffffff; --text: #17202a; --muted: #667085;
      --line: #d8dee8; --accent: #0f766e; --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column;
    }
    .wrap { width: min(960px, 100%); margin: 0 auto; padding: clamp(20px, 5vw, 48px) clamp(16px, 4vw, 32px); flex: 1 1 auto; display: flex; flex-direction: column; }
    header { margin-bottom: clamp(20px, 4vw, 36px); }
    h1 { margin: 0; font-size: clamp(1.5rem, 5vw, 2.2rem); letter-spacing: -0.01em; }
    .sub { margin-top: 6px; color: var(--muted); font-size: clamp(0.95rem, 2.6vw, 1.05rem); }

    .grid { display: grid; gap: clamp(14px, 3vw, 20px); grid-template-columns: 1fr; }
    @media (min-width: 720px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    .card {
      display: flex; flex-direction: column; gap: 10px; text-decoration: none; color: inherit;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      padding: clamp(20px, 4vw, 28px); min-height: clamp(150px, 32vw, 200px);
      box-shadow: 0 1px 2px rgba(16,24,40,.05); transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      position: relative; overflow: hidden;
    }
    .card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 5px; background: var(--card-accent, var(--accent)); }
    .card:hover, .card:focus-visible { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(16,24,40,.12); border-color: var(--card-accent, var(--accent)); outline: none; }
    .card:active { transform: translateY(-1px); }

    .icon { font-size: clamp(2.4rem, 9vw, 3.2rem); line-height: 1; }
    .name { font-size: clamp(1.15rem, 3.6vw, 1.4rem); font-weight: 800; }
    .desc { color: var(--muted); font-size: clamp(0.9rem, 2.6vw, 1rem); }
    .go { margin-top: auto; font-weight: 800; color: var(--card-accent, var(--accent)); display: inline-flex; align-items: center; gap: 6px; }

    .card.disabled { pointer-events: none; opacity: 0.6; }
    .card.disabled .go { color: var(--muted); }
    .pill { align-self: flex-start; font-size: 0.72rem; font-weight: 800; color: var(--muted); background: #eef2f6; border-radius: 999px; padding: 3px 10px; }

    footer { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{{ title }}</h1>
      <div class="sub">Elige una herramienta.</div>
    </header>

    <main class="grid">
      {% for app in apps %}
        {% if app.url %}
        <a class="card" href="{{ app.url }}" style="--card-accent: {{ app.accent }}">
          <div class="icon">{{ app.icon }}</div>
          <div class="name">{{ app.name }}</div>
          <div class="desc">{{ app.desc }}</div>
          <div class="go">Abrir &rarr;</div>
        </a>
        {% else %}
        <div class="card disabled" style="--card-accent: {{ app.accent }}">
          <div class="icon">{{ app.icon }}</div>
          <div class="name">{{ app.name }}</div>
          <div class="desc">{{ app.desc }}</div>
          <span class="pill">Sin configurar</span>
        </div>
        {% endif %}
      {% endfor %}
    </main>
  </div>
  <footer>Herramientas de descarga</footer>
</body>
</html>
