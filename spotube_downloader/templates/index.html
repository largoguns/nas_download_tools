<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotube Downloader</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8; --surface: #ffffff; --text: #17202a; --muted: #667085;
      --line: #d8dee8; --accent: #0f766e; --accent-strong: #115e59;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --blue: #1d4ed8; --red: #b42318; --amber: #a15c07; --violet: #6d28d9; --green: #16794c;
      --radius: 8px;
      /* Estados usados por el JS (getProgressColor / badges) */
      --pending: var(--amber); --downloading: var(--blue); --completed: var(--green);
      --failed: var(--red); --paused: var(--violet); --canceled: var(--muted);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.45; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.3rem, 3.4vw, 1.8rem); }
    h2 { font-size: 1rem; }
    .muted { color: var(--muted); } .small { font-size: 0.88rem; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

    /* ---- Carcasa con barra lateral (comun a la familia) ---- */
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 224px; flex: none; background: var(--surface); border-right: 1px solid var(--line); padding: 16px 12px; display: flex; flex-direction: column; gap: 6px; position: sticky; top: 0; height: 100vh; }
    .brand { padding: 6px 10px 14px; } .brand strong { font-size: 1.05rem; }
    .nav-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: transparent; color: var(--text); border: 1px solid transparent; border-radius: var(--radius); padding: 10px 12px; font: inherit; font-weight: 750; cursor: pointer; min-height: 44px; }
    .nav-item.active { background: var(--accent-soft); color: var(--accent-strong); }
    .nav-item .nav-ico { font-size: 1.1rem; line-height: 1; }
    .content { flex: 1 1 auto; min-width: 0; width: min(1180px, 100%); margin: 0 auto; padding: clamp(12px, 2.6vw, 24px); }
    .content-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .stack { display: grid; gap: 16px; }

    /* ---- Paneles ---- */
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: clamp(12px, 2.4vw, 16px); box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04); }
    .panel > h2 { margin-bottom: 12px; }
    .queue-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .queue-head-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .pager { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-weight: 700; }
    .pager .action-button:disabled { opacity: 0.45; }
    .updated-at { color: var(--muted); font-size: 0.82rem; font-weight: 600; }

    /* ---- Formulario ---- */
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
    input, button { min-height: 42px; border-radius: 6px; font: inherit; }
    input { width: 100%; border: 1px solid var(--line); padding: 0 10px; background: #fff; color: var(--text); }
    input:focus { border-color: var(--accent); outline: 3px solid var(--accent-soft); }
    button { border: 0; padding: 0 14px; background: var(--accent); color: #fff; cursor: pointer; font-weight: 750; white-space: nowrap; }
    button:hover { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: 0.58; }
    .message { min-height: 22px; margin-top: 10px; color: var(--muted); font-size: 0.92rem; }
    .message.error { color: var(--red); }
    .empty { border: 1px dashed var(--line); border-radius: var(--radius); padding: 18px; color: var(--muted); background: #fff; text-align: center; }

    .status-dot { width: 12px; height: 12px; border-radius: 999px; background: var(--green); box-shadow: 0 0 0 3px rgba(22, 121, 76, 0.15); }

    /* ---- Tabla de cola ---- */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.02em; color: var(--muted); font-weight: 800; padding: 6px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    tbody td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .queue-row:hover { background: #f9fbfb; }
    .id-cell { color: var(--muted); font-variant-numeric: tabular-nums; }
    .attempt-cell, .date-cell { color: var(--muted); white-space: nowrap; font-size: 0.84rem; }

    /* ---- Pildora de estado ---- */
    .badge { display: inline-flex; align-items: center; min-height: 24px; border-radius: 999px; padding: 0 10px; background: #eef2f6; color: var(--muted); font-size: 0.74rem; font-weight: 850; white-space: nowrap; }
    .badge.PENDING { color: var(--pending); }
    .badge.DOWNLOADING { color: var(--downloading); }
    .badge.COMPLETED { color: var(--completed); }
    .badge.FAILED { color: var(--failed); }
    .badge.PAUSED { color: var(--paused); }
    .badge.CANCELED { color: var(--canceled); }

    /* ---- Media (portada + titulo) ---- */
    .media-item { display: flex; gap: 10px; align-items: center; min-width: 220px; }
    .cover { width: 48px; height: 48px; border-radius: 6px; border: 1px solid var(--line); background: #eef2f6; object-fit: cover; flex: none; }
    .cover-placeholder { display: grid; place-items: center; color: var(--muted); font-weight: 800; font-size: 0.8rem; }
    .media-title { font-weight: 800; overflow-wrap: anywhere; }
    .media-meta { color: var(--muted); font-size: 0.82rem; overflow-wrap: anywhere; }
    .media-link { color: var(--blue); font-size: 0.8rem; text-decoration: none; font-weight: 700; }
    .media-link:hover { text-decoration: underline; }

    /* ---- Progreso (barra fina bajo el contador) ---- */
    .progress-cell { position: relative; min-width: 130px; padding-bottom: 16px; }
    .progress-count { font-weight: 750; font-variant-numeric: tabular-nums; }
    .progress-title { color: var(--muted); font-size: 0.8rem; overflow-wrap: anywhere; }
    .progress-cell::after { content: ""; position: absolute; left: 10px; right: 10px; bottom: 7px; height: 3px; border-radius: 999px; background: #e6ebf2; }
    .progress-cell::before { content: ""; position: absolute; left: 10px; bottom: 7px; height: 3px; border-radius: 999px; width: var(--progress-value, 0%); max-width: calc(100% - 20px); background: var(--progress-color, var(--line)); z-index: 1; }

    /* ---- Botones de accion (iconos) ---- */
    .action-cell { white-space: nowrap; }
    .action-group { display: flex; gap: 6px; justify-content: flex-end; }
    .action-button { min-height: 34px; width: 34px; padding: 0; display: inline-grid; place-items: center; background: var(--accent); border: 1px solid var(--accent); border-radius: 6px; color: #fff; cursor: pointer; }
    .action-button:hover { background: var(--accent-strong); }
    .action-button svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    /* El SVG no captura clics: asi event.target siempre es el boton. */
    button svg { pointer-events: none; }
    .action-button.secondary { background: #fff; color: var(--text); border-color: var(--line); }
    .action-button.secondary:hover { background: #eef2f6; }
    .action-button.danger { background: var(--red); border-color: var(--red); color: #fff; }
    .action-button.danger:hover { background: #912018; }

    .error-cell { text-align: center; }
    .error-button { min-height: 28px; width: 28px; padding: 0; border-radius: 999px; background: var(--red); color: #fff; font-weight: 900; cursor: pointer; border: 0; }

    .expand-cell { width: 40px; }
    .expand-button { min-height: 28px; width: 28px; padding: 0; border-radius: 6px; background: #fff; border: 1px solid var(--line); color: var(--muted); cursor: pointer; font-weight: 800; }
    .expand-button:hover { background: #eef2f6; }

    /* ---- Detalle por pista ---- */
    .tracks-row > td { padding: 0 10px 12px; }
    .tracks-panel { background: #f9fbfb; border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; }
    .tracks-table { font-size: 0.84rem; }
    .tracks-table thead th { border-bottom: 1px solid var(--line); }
    .tracks-table td { padding: 6px 8px; border-bottom: 1px solid #eef2f6; }
    .track-position { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .track-title { font-weight: 700; }
    .track-artist { color: var(--muted); font-size: 0.8rem; }
    .track-status-badge { display: inline-flex; min-height: 20px; align-items: center; border-radius: 999px; padding: 0 8px; background: #eef2f6; color: var(--muted); font-size: 0.7rem; font-weight: 800; }
    .track-status-badge.PENDING { color: var(--pending); }
    .track-status-badge.DOWNLOADING { color: var(--downloading); }
    .track-status-badge.COMPLETED { color: var(--completed); }
    .track-status-badge.FAILED { color: var(--failed); }
    .track-status-badge.EXISTS { color: var(--muted); }

    /* ---- Modal de error ---- */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(16, 24, 40, 0.45); display: grid; place-items: center; padding: 16px; z-index: 80; }
    .modal-backdrop[hidden] { display: none; }
    .modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--line); width: min(640px, 100%); max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .modal-title { font-weight: 800; }
    .modal-close { min-height: 32px; width: 32px; padding: 0; background: #fff; border: 1px solid var(--line); border-radius: 6px; color: var(--text); cursor: pointer; }
    .modal-body { padding: 16px; overflow: auto; }
    .error-detail { white-space: pre-wrap; overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.82rem; margin: 0; color: var(--red); }

    /* ---- Responsive: barra lateral pasa a inferior ---- */
    @media (max-width: 820px) {
      .app { flex-direction: column; }
      .sidebar { position: fixed; bottom: 0; left: 0; right: 0; top: auto; width: auto; height: auto; flex-direction: row; gap: 4px; border-right: 0; border-top: 1px solid var(--line); padding: 6px; z-index: 60; }
      .brand { display: none; }
      .nav-item { flex-direction: column; gap: 2px; font-size: 0.72rem; padding: 6px 2px; justify-content: center; text-align: center; min-height: 52px; }
      .nav-item .nav-ico { font-size: 1.25rem; }
      .content { width: 100%; padding-bottom: 78px; }
    }

    /* ---- Vistas / navegacion ---- */
    .view[hidden] { display: none; }
    .nav-item .nav-label { flex: 1 1 auto; }
    .nav-badge { min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--blue); color: #fff; font-size: 0.72rem; font-weight: 800; display: none; align-items: center; justify-content: center; }
    .nav-badge.show { display: inline-flex; }
    #search-form { display: grid; gap: 10px; grid-template-columns: 1fr; align-items: end; }
    @media (min-width: 640px) { #search-form { grid-template-columns: minmax(0, 1fr) auto; } }
    button.small { min-height: 34px; padding: 2px 12px; font-size: 0.82rem; }
    .ghost { border: 1px solid var(--line); background: #fff; color: var(--text); }
    .ghost:hover { background: #eef2f6; }

    /* ---- Resultados de busqueda (cuadricula) ---- */
    #search-results { display: grid; gap: 22px; }
    .results-heading { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; font-weight: 800; margin-bottom: 10px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .card { border: 1px solid var(--line); border-radius: var(--radius); background: #fff; overflow: hidden; display: flex; flex-direction: column; }
    .card-cover { position: relative; aspect-ratio: 1 / 1; background: #eef2f6; }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-cover .cover-ph { width: 100%; height: 100%; display: grid; place-items: center; font-size: 2rem; }
    .card-icon { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 999px; background: rgba(255, 255, 255, 0.92); display: grid; place-items: center; font-size: 0.95rem; box-shadow: 0 1px 3px rgba(16, 24, 40, 0.25); }
    .card-body { padding: 8px 10px 6px; flex: 1 1 auto; }
    .card-title { font-weight: 800; font-size: 0.9rem; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-artist { color: var(--muted); font-size: 0.8rem; margin-top: 2px; overflow-wrap: anywhere; }
    .card-add { width: calc(100% - 20px); margin: 0 10px 10px; }
    .card-add svg, #search-button svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: middle; }
    #search-button { width: 46px; padding: 0; display: grid; place-items: center; }

    /* ---- Grupo de album en la cola ---- */
    .group-row { background: #eef4f3; }
    .group-row:hover { background: #e7f0ef; }
    .group-cell { padding: 10px; }
    .group-main { display: flex; align-items: center; gap: 12px; }
    .group-main .cover { width: 44px; height: 44px; }
    .group-info { flex: 1 1 auto; min-width: 0; }
    .group-main > .badge { margin-left: auto; }
    .group-child > td:first-child { border-left: 3px solid var(--accent-soft); }
    .group-cell .bar { height: 4px; background: #e6ebf2; border-radius: 999px; margin-top: 8px; overflow: hidden; }
    .group-cell .bar > span { display: block; height: 100%; border-radius: 999px; }

    /* ---- Cola: tabla en escritorio, cuadricula de tarjetas en movil ---- */
    #queue-cards { display: none; }
    .queue-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .qcard { border: 1px solid var(--line); border-radius: var(--radius); background: #fff; overflow: hidden; display: flex; flex-direction: column; }
    .qcard .card-cover { position: relative; aspect-ratio: 1 / 1; background: #eef2f6; }
    .qcard .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .qcard .cover-ph { width: 100%; height: 100%; display: grid; place-items: center; font-size: 2rem; }
    .qcard .card-icon { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 999px; background: rgba(255,255,255,.92); display: grid; place-items: center; font-size: 0.95rem; box-shadow: 0 1px 3px rgba(16,24,40,.25); }
    .qcard-body { padding: 8px 10px 6px; flex: 1 1 auto; }
    .qcard-title { font-weight: 800; font-size: 0.9rem; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .qcard-artist { color: var(--muted); font-size: 0.8rem; margin-top: 2px; overflow-wrap: anywhere; }
    .qcard-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .qcard-count { color: var(--muted); font-size: 0.76rem; font-variant-numeric: tabular-nums; }
    .qcard-bar { height: 4px; background: #e6ebf2; }
    .qcard-bar > span { display: block; height: 100%; width: 0%; }
    .qcard-actions { display: flex; gap: 6px; padding: 8px 10px 10px; }
    .qcard-actions .action-button { flex: 0 0 auto; }

    @media (max-width: 720px) {
      .table-wrap { display: none; }
      #queue-cards { display: grid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <strong>Spotube</strong>
        <div class="muted small">Musica</div>
      </div>
      <button class="nav-item active" type="button" data-view="busqueda">
        <span class="nav-ico">&#128269;</span><span class="nav-label">Búsqueda</span>
      </button>
      <button class="nav-item" type="button" data-view="descargas">
        <span class="nav-ico">&#11015;</span><span class="nav-label">Descargas</span>
        <span id="queueBadge" class="nav-badge">0</span>
      </button>
    </aside>

    <main class="content">
      <div class="content-head">
        <h1 id="viewTitle">Búsqueda</h1>
        <span class="status-dot" title="Worker activo" aria-label="Worker activo"></span>
      </div>

      <!-- ===================== BÚSQUEDA ===================== -->
      <section id="view-busqueda" class="view stack">
        <section class="panel" aria-labelledby="search-title">
          <h2 id="search-title">Buscar en Spotify</h2>
          <form id="search-form" autocomplete="off">
            <div>
              <label for="search-input">Título, álbum, artista o enlace de Spotify</label>
              <input id="search-input" type="text" placeholder="p. ej. Daft Punk Discovery — o pega un enlace de Spotify">
            </div>
            <button id="search-button" type="submit" title="Buscar"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
          </form>
          <div id="search-message" class="message" role="status" aria-live="polite"></div>
        </section>
        <section class="panel">
          <div id="search-results" class="list"></div>
        </section>
      </section>

      <!-- ===================== DESCARGAS ===================== -->
      <section id="view-descargas" class="view stack" hidden>
        <section aria-labelledby="queue-title">
          <div class="queue-header">
            <h2 id="queue-title">Estado de la cola</h2>
            <div class="queue-head-right">
              <span class="pager">
                <button id="queuePrev" class="action-button secondary" type="button" title="Anterior"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg></button>
                <span id="queuePageInfo" class="muted small">-</span>
                <button id="queueNext" class="action-button secondary" type="button" title="Siguiente"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
              </span>
              <span id="updated-at" class="updated-at"></span>
            </div>
          </div>
          <div id="message" class="message" role="status" aria-live="polite"></div>
          <div class="panel">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th></th>
                    <th>ID</th>
                    <th>Estado</th>
                    <th>Contenido</th>
                    <th>Progreso</th>
                    <th>Intentos</th>
                    <th>Creado</th>
                    <th>Actualizado</th>
                    <th>Error</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody id="queue-body"></tbody>
              </table>
            </div>
            <div id="queue-cards" class="grid queue-grid"></div>
            <div id="empty-state" class="empty" hidden>Sin descargas en cola.</div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="error-modal" class="modal-backdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="error-modal-title">
      <div class="modal-header">
        <div id="error-modal-title" class="modal-title">Detalle del error</div>
        <button id="error-modal-close" class="modal-close" type="button" aria-label="Cerrar">x</button>
      </div>
      <div class="modal-body">
        <pre id="error-modal-content" class="error-detail"></pre>
      </div>
    </section>
  </div>

  <script>
    // Prefijo publico bajo el proxy (p. ej. "/spotube"); vacio en acceso directo.
    const API_BASE = "{{ base_path }}";
    const DOWNLOAD_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>';
    const CHECK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>';
    const message = document.querySelector("#message");
    const queueBody = document.querySelector("#queue-body");
    const emptyState = document.querySelector("#empty-state");
    const updatedAt = document.querySelector("#updated-at");
    const errorModal = document.querySelector("#error-modal");
    const errorModalTitle = document.querySelector("#error-modal-title");
    const errorModalContent = document.querySelector("#error-modal-content");
    const errorModalClose = document.querySelector("#error-modal-close");
    const errorDetails = new Map();
    const expandedDownloads = new Set();
    let maxAttempts = 3;

    const statusLabels = {
      PENDING: "Pendiente",
      DOWNLOADING: "Descargando",
      COMPLETED: "Completado",
      FAILED: "Fallido",
      PAUSED: "Pausado",
      CANCELED: "Cancelado",
    };

    const typeLabels = {
      album: "Álbum",
      playlist: "Playlist",
      track: "Canción",
    };

    const trackStatusLabels = {
      PENDING: "Pendiente",
      EXISTS: "Ya estaba",
      DOWNLOADING: "Descargando",
      COMPLETED: "Descargada",
      FAILED: "Fallida",
    };

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function formatDate(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("es-ES", {
        dateStyle: "short",
        timeStyle: "medium",
      }).format(new Date(value));
    }

    function appendCell(row, text, className) {
      const cell = document.createElement("td");
      if (className) cell.className = className;
      cell.textContent = text || "";
      row.appendChild(cell);
      return cell;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getProgressPercent(item) {
      const total = Number(item.progress_total || 0);
      if (!total) return 0;

      const current = item.status === "COMPLETED"
        ? total
        : Number(item.progress_current || 0);
      return clamp((current / total) * 100, 0, 100);
    }

    function getProgressColor(item) {
      if (item.status === "FAILED") return "var(--failed)";
      if (item.status === "PAUSED") return "var(--paused)";
      if (item.status === "CANCELED") return "var(--canceled)";
      if (item.status === "COMPLETED") return "var(--completed)";
      if (item.status === "DOWNLOADING") return "var(--downloading)";
      return "var(--line)";
    }

    function getTypeLabel(type) {
      return typeLabels[type] || "Spotify";
    }

    // ETA estimada por ritmo de canciones (EWMA sobre la variacion entre sondeos).
    const _eta = new Map();
    function etaSeconds(id, current, total, status) {
      if (status !== "DOWNLOADING" || !total || current <= 0 || current >= total) { _eta.delete(id); return null; }
      const now = Date.now() / 1000;
      const prev = _eta.get(id);
      let speed = prev ? prev.speed : 0;
      if (prev && now > prev.ts && current > prev.value) {
        const inst = (current - prev.value) / (now - prev.ts);
        speed = prev.speed ? prev.speed * 0.6 + inst * 0.4 : inst;
      }
      _eta.set(id, { value: current, ts: now, speed });
      return speed > 0 ? (total - current) / speed : null;
    }
    function fmtEta(s) {
      if (s == null || !isFinite(s)) return "";
      s = Math.round(s);
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.floor(s / 60)}m ${s % 60}s`;
      return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
    }

    function getFallbackTitle(item) {
      if (item.metadata_status === "PENDING" || item.metadata_status === "FETCHING") {
        return "Leyendo Spotify...";
      }

      return getTypeLabel(item.metadata_type);
    }

    function createCoverPlaceholder(item) {
      const cover = document.createElement("div");
      cover.className = "cover cover-placeholder";
      cover.textContent = getTypeLabel(item.metadata_type).slice(0, 2).toUpperCase();
      return cover;
    }

    function appendMediaCell(row, item) {
      const cell = document.createElement("td");
      cell.className = "media-cell";

      const wrapper = document.createElement("div");
      wrapper.className = "media-item";

      if (item.metadata_image_url) {
        const image = document.createElement("img");
        image.className = "cover";
        image.src = item.metadata_image_url;
        image.alt = "";
        image.loading = "lazy";
        image.addEventListener("error", () => {
          image.replaceWith(createCoverPlaceholder(item));
        }, { once: true });
        wrapper.appendChild(image);
      } else {
        wrapper.appendChild(createCoverPlaceholder(item));
      }

      const body = document.createElement("div");
      const title = document.createElement("div");
      title.className = "media-title";
      title.textContent = item.metadata_title || getFallbackTitle(item);

      const meta = document.createElement("div");
      meta.className = "media-meta";
      meta.textContent = [
        getTypeLabel(item.metadata_type),
        item.metadata_artist,
      ].filter(Boolean).join(" · ");

      const link = document.createElement("a");
      link.className = "media-link";
      link.href = item.url;
      link.target = "_blank";
      link.rel = "noreferrer";
      link.textContent = "Abrir en Spotify";

      body.append(title, meta, link);
      wrapper.appendChild(body);
      cell.appendChild(wrapper);
      row.appendChild(cell);
      return cell;
    }

    function appendProgressCell(row, item) {
      const cell = document.createElement("td");
      cell.className = "progress-cell";

      const total = Number(item.progress_total || 0);
      const current = total ? clamp(Number(item.progress_current || 0), 0, total) : 0;

      const eta = fmtEta(etaSeconds(item.id, current, total, item.status));
      const count = document.createElement("div");
      count.className = "progress-count";
      count.textContent = (total ? `${current}/${total}` : (item.status === "PENDING" ? "En cola" : (statusLabels[item.status] || "-")))
        + (eta ? ` · ETA ${eta}` : "");

      const title = document.createElement("div");
      title.className = "progress-title";
      title.textContent = item.progress_title || (
        item.status === "COMPLETED" && total ? "Completado" : ""
      );

      cell.append(count, title);
      row.appendChild(cell);
      return cell;
    }

    const actionIconPaths = {
      pause: [
        '<rect x="6" y="4" width="4" height="16" rx="1"></rect>',
        '<rect x="14" y="4" width="4" height="16" rx="1"></rect>',
      ],
      resume: [
        '<polygon points="6 4 20 12 6 20 6 4"></polygon>',
      ],
      cancel: [
        '<path d="M18 6 6 18"></path>',
        '<path d="m6 6 12 12"></path>',
      ],
      retry: [
        '<path d="M3 12a9 9 0 0 1 15.1-6.6L21 8"></path>',
        '<path d="M21 3v5h-5"></path>',
        '<path d="M21 12a9 9 0 0 1-15.1 6.6L3 16"></path>',
        '<path d="M3 21v-5h5"></path>',
      ],
      delete: [
        '<path d="M3 6h18"></path>',
        '<path d="M8 6V4h8v2"></path>',
        '<path d="M19 6l-1 14H6L5 6"></path>',
        '<path d="M10 11v6"></path>',
        '<path d="M14 11v6"></path>',
      ],
    };

    function createIcon(action) {
      const icon = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      icon.setAttribute("viewBox", "0 0 24 24");
      icon.setAttribute("aria-hidden", "true");
      icon.innerHTML = (actionIconPaths[action] || []).join("");
      return icon;
    }

    function createActionButton(item, action, label, variant = "") {
      const button = document.createElement("button");
      button.className = `action-button ${variant}`.trim();
      button.type = "button";
      button.dataset.action = action;
      button.dataset.downloadId = item.id;
      button.title = label;
      button.setAttribute("aria-label", `${label} descarga ${item.id}`);
      button.appendChild(createIcon(action));

      const accessibleLabel = document.createElement("span");
      accessibleLabel.className = "sr-only";
      accessibleLabel.textContent = label;
      button.appendChild(accessibleLabel);
      return button;
    }

    function buildActionButtons(item) {
      const spec = {
        PENDING: [["pause", "Pausar", "secondary"], ["cancel", "Cancelar", "danger"], ["delete", "Eliminar", "secondary"]],
        DOWNLOADING: [["pause", "Pausar", "secondary"], ["cancel", "Cancelar", "danger"]],
        PAUSED: [["resume", "Reanudar", ""], ["cancel", "Cancelar", "danger"], ["delete", "Eliminar", "secondary"]],
        FAILED: [["retry", "Reintentar", ""], ["delete", "Eliminar", "secondary"]],
        COMPLETED: [["retry", "Reprocesar", ""], ["delete", "Eliminar", "secondary"]],
        CANCELED: [["retry", "Reintentar", ""], ["delete", "Eliminar", "secondary"]],
      };
      return (spec[item.status] || []).map(([action, label, variant]) => createActionButton(item, action, label, variant));
    }

    function appendActionCell(row, item) {
      const cell = document.createElement("td");
      cell.className = "action-cell";
      const group = document.createElement("div");
      group.className = "action-group";
      for (const button of buildActionButtons(item)) group.appendChild(button);
      cell.appendChild(group);
      row.appendChild(cell);
      return cell;
    }

    function buildErrorButton(item) {
      if (!item.error) return null;
      errorDetails.set(String(item.id), { title: `Error en descarga #${item.id}`, text: item.error });
      const errorButton = document.createElement("button");
      errorButton.className = "error-button";
      errorButton.type = "button";
      errorButton.dataset.errorId = item.id;
      errorButton.title = "Ver error";
      errorButton.setAttribute("aria-label", `Ver error de la descarga ${item.id}`);
      errorButton.textContent = "!";
      return errorButton;
    }

    function appendErrorCell(row, item) {
      const cell = document.createElement("td");
      cell.className = "error-cell";
      const errorButton = buildErrorButton(item);
      if (errorButton) cell.appendChild(errorButton);
      row.appendChild(cell);
      return cell;
    }

    function openErrorModal(error) {
      errorModalTitle.textContent = error.title;
      errorModalContent.textContent = error.text;
      errorModal.hidden = false;
      errorModalClose.focus();
    }

    function closeErrorModal() {
      errorModal.hidden = true;
      errorModalContent.textContent = "";
    }

    function toggleDownload(downloadId) {
      const key = String(downloadId);
      if (expandedDownloads.has(key)) {
        expandedDownloads.delete(key);
      } else {
        expandedDownloads.add(key);
      }
      loadStatus().catch((error) => setMessage(error.message, true));
    }

    function createExpandCell(item, expanded) {
      const cell = document.createElement("td");
      cell.className = "expand-cell";

      const button = document.createElement("button");
      button.className = "expand-button";
      button.type = "button";
      button.dataset.expandId = item.id;
      button.setAttribute("aria-expanded", String(expanded));
      button.setAttribute("aria-label", `${expanded ? "Plegar" : "Desplegar"} descarga ${item.id}`);
      button.textContent = expanded ? "v" : ">";

      cell.appendChild(button);
      return cell;
    }

    function createTrackDetailsRow(item, expanded, colSpan) {
      const row = document.createElement("tr");
      row.className = "tracks-row";
      row.dataset.tracksFor = item.id;
      row.hidden = !expanded;

      const cell = document.createElement("td");
      cell.colSpan = colSpan;

      const panel = document.createElement("div");
      panel.className = "tracks-panel";

      const tracks = item.tracks || [];
      if (tracks.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Las canciones aparecerán cuando empiece el procesamiento.";
        panel.appendChild(empty);
      } else {
        const table = document.createElement("table");
        table.className = "tracks-table";

        const head = document.createElement("thead");
        const headRow = document.createElement("tr");
        for (const label of ["#", "Estado", "Canción"]) {
          const th = document.createElement("th");
          th.textContent = label;
          headRow.appendChild(th);
        }
        head.appendChild(headRow);
        table.appendChild(head);

        const body = document.createElement("tbody");
        for (const track of tracks) {
          const trackRow = document.createElement("tr");

          const position = document.createElement("td");
          position.className = "track-position";
          position.textContent = `${track.position}/${tracks.length}`;

          const status = document.createElement("td");
          status.className = "track-status";
          const statusBadge = document.createElement("span");
          statusBadge.className = `track-status-badge ${track.status}`;
          statusBadge.textContent = trackStatusLabels[track.status] || track.status;
          status.appendChild(statusBadge);

          const title = document.createElement("td");
          const titleText = document.createElement("div");
          titleText.className = "track-title";
          titleText.textContent = track.title || "Canción sin título";
          const artist = document.createElement("div");
          artist.className = "track-artist";
          artist.textContent = track.artist || "";
          title.append(titleText, artist);

          trackRow.append(position, status, title);
          body.appendChild(trackRow);
        }
        table.appendChild(body);
        panel.appendChild(table);
      }

      cell.appendChild(panel);
      row.appendChild(cell);
      return row;
    }

    function buildDownloadRows(item, opts = {}) {
      const row = document.createElement("tr");
      const expanded = expandedDownloads.has(String(item.id));
      row.className = "queue-row" + (opts.child ? " group-child" : "");
      row.dataset.downloadId = item.id;
      if (opts.groupId) row.dataset.group = opts.groupId;
      if (opts.hidden) row.hidden = true;
      row.style.setProperty("--progress-value", `${getProgressPercent(item)}%`);
      row.style.setProperty("--progress-color", getProgressColor(item));

      if (opts.child) {
        const spacer = document.createElement("td");
        spacer.className = "expand-cell";
        row.appendChild(spacer);
      } else {
        row.appendChild(createExpandCell(item, expanded));
      }
      appendCell(row, `#${item.id}`, "id-cell");

      const statusCell = document.createElement("td");
      statusCell.className = "status-cell";
      const badge = document.createElement("span");
      badge.className = `badge ${item.status}`;
      badge.textContent = statusLabels[item.status] || item.status;
      statusCell.appendChild(badge);
      row.appendChild(statusCell);

      appendMediaCell(row, item);
      appendProgressCell(row, item);
      appendCell(row, `${item.attempt_count || 0}/${maxAttempts}`, "attempt-cell");
      appendCell(row, formatDate(item.created_at), "date-cell");
      appendCell(row, formatDate(item.updated_at), "date-cell");
      appendErrorCell(row, item);
      appendActionCell(row, item);

      // Las pistas de un album son canciones sueltas: sin sub-detalle propio.
      if (opts.child) return [row];
      const detailsRow = createTrackDetailsRow(item, expanded, 10);
      return [row, detailsRow];
    }

    function aggregateStatus(items) {
      const s = items.map((i) => i.status);
      if (s.some((x) => x === "DOWNLOADING")) return "DOWNLOADING";
      if (s.some((x) => x === "PENDING" || x === "PAUSED")) return "PENDING";
      if (s.length && s.every((x) => x === "COMPLETED")) return "COMPLETED";
      if (s.some((x) => x === "FAILED")) return "FAILED";
      return s[0] || "PENDING";
    }

    function buildGroupHeader(groupId, group, expanded) {
      const row = document.createElement("tr");
      row.className = "group-row";

      const toggle = document.createElement("td");
      toggle.className = "expand-cell";
      const tbtn = document.createElement("button");
      tbtn.className = "expand-button";
      tbtn.type = "button";
      tbtn.dataset.groupExpand = groupId;
      tbtn.setAttribute("aria-expanded", String(expanded));
      tbtn.textContent = expanded ? "v" : ">";
      toggle.appendChild(tbtn);
      row.appendChild(toggle);

      const cell = document.createElement("td");
      cell.colSpan = 9;
      cell.className = "group-cell";
      const total = group.items.length;
      const done = group.items.filter((i) => i.status === "COMPLETED").length;
      const st = aggregateStatus(group.items);
      const pct = total ? Math.round((done / total) * 100) : 0;
      const eta = fmtEta(etaSeconds(groupId, done, total, st));
      const img = (group.items.find((i) => i.metadata_image_url) || {}).metadata_image_url;
      cell.innerHTML = `
        <div class="group-main">
          ${img ? `<img class="cover" src="${img}" alt="" loading="lazy">` : `<div class="cover cover-placeholder">AL</div>`}
          <div class="group-info">
            <div class="media-title"></div>
            <div class="media-meta">Álbum · ${done}/${total} completadas${eta ? ` · ETA ${eta}` : ""}</div>
          </div>
          <span class="badge ${st}">${statusLabels[st] || st}</span>
          <div class="action-group">
            <button class="action-button danger" type="button" data-group-delete="${groupId}" title="Eliminar álbum"></button>
          </div>
        </div>
        <div class="bar"><span style="width:${pct}%; background:${getProgressColor({ status: st })}"></span></div>`;
      cell.querySelector(".media-title").textContent = group.title;
      cell.querySelector("[data-group-delete]").appendChild(createIcon("delete"));
      row.appendChild(cell);
      return row;
    }

    // Cabecera de "unidad" para un album/playlist que es UNA sola descarga (enlace
    // directo de Spotify): mismo aspecto que la cabecera de grupo de Deezer.
    function buildUnitHeader(item, expanded) {
      const row = document.createElement("tr");
      row.className = "group-row";
      row.dataset.downloadId = item.id;
      row.appendChild(createExpandCell(item, expanded));  // data-expand-id → toggleDownload

      const cell = document.createElement("td");
      cell.colSpan = 9;
      cell.className = "group-cell";
      const total = Number(item.progress_total || 0);
      const done = item.status === "COMPLETED" ? total : Number(item.progress_current || 0);
      const typeLabel = item.metadata_type === "playlist" ? "Playlist" : "Álbum";
      const eta = fmtEta(etaSeconds(item.id, done, total, item.status));
      const meta = (total ? `${typeLabel} · ${done}/${total} completadas` : `${typeLabel} · ${statusLabels[item.status] || ""}`)
        + (eta ? ` · ETA ${eta}` : "");
      const img = item.metadata_image_url;
      const pct = getProgressPercent(item);
      cell.innerHTML = `
        <div class="group-main">
          ${img ? `<img class="cover" src="${img}" alt="" loading="lazy">` : `<div class="cover cover-placeholder">${item.metadata_type === "playlist" ? "PL" : "AL"}</div>`}
          <div class="group-info">
            <div class="media-title"></div>
            <div class="media-meta"></div>
          </div>
          <span class="badge ${item.status}">${statusLabels[item.status] || item.status}</span>
          <div class="action-group"></div>
        </div>
        <div class="bar"><span style="width:${pct}%; background:${getProgressColor(item)}"></span></div>`;
      cell.querySelector(".media-title").textContent = item.metadata_title || getFallbackTitle(item);
      cell.querySelector(".media-meta").textContent = meta;
      const group = cell.querySelector(".action-group");
      const errorButton = buildErrorButton(item);
      if (errorButton) group.appendChild(errorButton);
      for (const button of buildActionButtons(item)) group.appendChild(button);
      row.appendChild(cell);
      return row;
    }

    function isMultiTrackUnit(item) {
      return !item.group_id && (item.metadata_type === "album" || item.metadata_type === "playlist");
    }

    function renderItems(items) {
      queueBody.replaceChildren();
      errorDetails.clear();
      emptyState.hidden = items.length !== 0;

      // Agrupar por group_id preservando el orden de primera aparición.
      const groups = new Map();
      const order = [];
      for (const item of items) {
        if (item.group_id) {
          if (!groups.has(item.group_id)) {
            groups.set(item.group_id, { title: item.group_title || "Álbum", items: [] });
            order.push({ type: "group", id: item.group_id });
          }
          groups.get(item.group_id).items.push(item);
        } else {
          order.push({ type: "single", item });
        }
      }

      for (const entry of order) {
        if (entry.type === "single") {
          const item = entry.item;
          if (isMultiTrackUnit(item)) {
            // Album/playlist de enlace directo: cabecera tipo album + pistas al desplegar.
            const expanded = expandedDownloads.has(String(item.id));
            queueBody.appendChild(buildUnitHeader(item, expanded));
            queueBody.appendChild(createTrackDetailsRow(item, expanded, 10));
          } else {
            for (const r of buildDownloadRows(item)) queueBody.appendChild(r);
          }
        } else {
          const group = groups.get(entry.id);
          const expanded = expandedDownloads.has(entry.id);
          queueBody.appendChild(buildGroupHeader(entry.id, group, expanded));
          for (const item of group.items) {
            for (const r of buildDownloadRows(item, { child: true, hidden: !expanded, groupId: entry.id })) {
              queueBody.appendChild(r);
            }
          }
        }
      }
    }

    function getActionRequest(action, downloadId) {
      if (action === "delete") {
        return {
          url: `${API_BASE}/download/${downloadId}`,
          options: { method: "DELETE" },
          success: `Descarga #${downloadId} eliminada de la cola.`,
        };
      }

      const successLabels = {
        pause: "pausada",
        resume: "reanudada",
        cancel: "cancelada",
        retry: "reencolada",
      };

      return {
        url: `${API_BASE}/${action}/${downloadId}`,
        options: { method: "POST" },
        success: `Descarga #${downloadId} ${successLabels[action] || "actualizada"}.`,
      };
    }

    async function performQueueAction(actionButton) {
      const action = actionButton.dataset.action;
      const downloadId = actionButton.dataset.downloadId;
      if (!action || !downloadId) return;

      if (action === "delete" && !window.confirm(`Eliminar la descarga #${downloadId} de la cola? No se borraran archivos de musica.`)) {
        return;
      }

      const request = getActionRequest(action, downloadId);
      actionButton.disabled = true;
      setMessage("");

      try {
        const response = await fetch(request.url, request.options);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "No se pudo aplicar la accion.");
        }

        setMessage(request.success);
        await loadStatus();
      } catch (error) {
        setMessage(error.message, true);
      } finally {
        actionButton.disabled = false;
      }
    }

    let queuePage = 1;
    const QUEUE_PER_PAGE = 20;  // unidades (discos/playlists/canciones) por pagina

    function pluralize(n, singular) {
      return `${n} ${singular}${n === 1 ? "" : "s"}`;
    }

    async function loadStatus() {
      const response = await fetch(`${API_BASE}/status?page=${queuePage}&per_page=${QUEUE_PER_PAGE}`, { cache: "no-store" });
      if (!response.ok) throw new Error("No se pudo cargar la cola.");
      const data = await response.json();
      maxAttempts = data.config?.spotdl_max_attempts || maxAttempts;
      queuePage = data.page || 1;
      const totalPages = data.total_pages || 1;
      renderItems(data.items || []);      // tabla (escritorio)
      renderCards(data.items || []);      // cuadricula de tarjetas (movil)

      const s = data.summary || {};
      const parts = [];
      if (s.discos) parts.push(pluralize(s.discos, "disco"));
      if (s.playlists) parts.push(pluralize(s.playlists, "playlist"));
      if (s.sueltas) parts.push(pluralize(s.sueltas, "suelta"));
      const breakdown = parts.length ? ` · ${parts.join(" · ")}` : "";
      const songs = s.canciones ? ` · ${pluralize(s.canciones, "cancion")}` : "";
      document.querySelector("#queuePageInfo").textContent = `Pag. ${queuePage}/${totalPages}${songs}${breakdown}`;
      document.querySelector("#queuePrev").disabled = queuePage <= 1;
      document.querySelector("#queueNext").disabled = queuePage >= totalPages;
      updatedAt.textContent = `Actualizado ${formatDate(new Date().toISOString())}`;
    }

    document.querySelector("#queuePrev").addEventListener("click", () => {
      if (queuePage > 1) { queuePage -= 1; loadStatus().catch((e) => setMessage(e.message, true)); }
    });
    document.querySelector("#queueNext").addEventListener("click", () => {
      queuePage += 1; loadStatus().catch((e) => setMessage(e.message, true));
    });

    // ---- Cuadricula de tarjetas para movil ----
    const queueCards = document.querySelector("#queue-cards");

    function queueCardActions(item) {
      const s = item.status;
      if (s === "PENDING" || s === "DOWNLOADING") return [["pause", "Pausar", "secondary"], ["cancel", "Cancelar", "danger"]];
      if (s === "PAUSED") return [["resume", "Reanudar", ""], ["cancel", "Cancelar", "danger"], ["delete", "Eliminar", "secondary"]];
      if (s === "FAILED") return [["retry", "Reintentar", ""], ["delete", "Eliminar", "danger"]];
      return [["retry", "Reprocesar", ""], ["delete", "Eliminar", "danger"]]; // COMPLETED / CANCELED
    }

    function buildQueueCard(item) {
      const card = document.createElement("div");
      card.className = "card qcard";
      const pct = getProgressPercent(item);
      const color = getProgressColor(item);
      const total = Number(item.progress_total || 0);
      const current = item.status === "COMPLETED" ? total : Number(item.progress_current || 0);
      const eta = fmtEta(etaSeconds(item.id, current, total, item.status));
      const count = (total ? `${current}/${total}` : "") + (eta ? ` · ETA ${eta}` : "");
      const cover = item.metadata_image_url
        ? `<img src="${item.metadata_image_url}" alt="" loading="lazy">`
        : `<div class="cover-ph">🎵</div>`;
      card.innerHTML = `
        <div class="card-cover">${cover}<span class="card-icon">🎵</span></div>
        <div class="qcard-body">
          <div class="qcard-title"></div>
          <div class="qcard-artist"></div>
          <div class="qcard-meta">
            <span class="badge ${item.status}">${statusLabels[item.status] || item.status}</span>
            <span class="qcard-count">${count}</span>
          </div>
        </div>
        <div class="qcard-bar"><span style="width:${pct}%; background:${color}"></span></div>
        <div class="qcard-actions"></div>`;
      card.querySelector(".qcard-title").textContent = item.metadata_title || getFallbackTitle(item);
      card.querySelector(".qcard-artist").textContent = item.metadata_artist || "";
      const actions = card.querySelector(".qcard-actions");
      for (const [action, label, variant] of queueCardActions(item)) {
        // Mismo boton-icono que la tabla de escritorio (createActionButton).
        const btn = createActionButton(item, action, label, variant);
        btn.addEventListener("click", () => performQueueAction(btn));
        actions.appendChild(btn);
      }
      return card;
    }

    function buildAlbumCard(groupId, group) {
      const card = document.createElement("div");
      card.className = "card qcard";
      const total = group.items.length;
      const done = group.items.filter((i) => i.status === "COMPLETED").length;
      const st = aggregateStatus(group.items);
      const pct = total ? (done / total) * 100 : 0;
      const img = (group.items.find((i) => i.metadata_image_url) || {}).metadata_image_url;
      const cover = img ? `<img src="${img}" alt="" loading="lazy">` : `<div class="cover-ph">💿</div>`;
      card.innerHTML = `
        <div class="card-cover">${cover}<span class="card-icon">💿</span></div>
        <div class="qcard-body">
          <div class="qcard-title"></div>
          <div class="qcard-artist"></div>
          <div class="qcard-meta">
            <span class="badge ${st}">${statusLabels[st] || st}</span>
            <span class="qcard-count">${done}/${total}</span>
          </div>
        </div>
        <div class="qcard-bar"><span style="width:${pct}%; background:${getProgressColor({ status: st })}"></span></div>
        <div class="qcard-actions"><button class="action-button danger" type="button" title="Eliminar álbum"></button></div>`;
      card.querySelector(".qcard-title").textContent = group.title;
      card.querySelector(".qcard-artist").textContent = `Álbum · ${total} canciones`;
      const btn = card.querySelector(".qcard-actions button");
      btn.appendChild(createIcon("delete"));
      btn.addEventListener("click", async () => {
        const ids = group.items.map((i) => i.id);
        if (!window.confirm(`Eliminar el álbum (${ids.length} canciones) de la cola? No se borran archivos.`)) return;
        try {
          for (const id of ids) await fetch(`${API_BASE}/download/${id}`, { method: "DELETE" });
          await loadStatus();
        } catch (error) {
          setMessage(error.message, true);
        }
      });
      return card;
    }

    function renderCards(items) {
      queueCards.replaceChildren();
      const groups = new Map();
      const order = [];
      for (const item of items) {
        if (item.group_id) {
          if (!groups.has(item.group_id)) {
            groups.set(item.group_id, { title: item.group_title || "Álbum", items: [] });
            order.push({ type: "group", id: item.group_id });
          }
          groups.get(item.group_id).items.push(item);
        } else {
          order.push({ type: "single", item });
        }
      }
      for (const entry of order) {
        queueCards.appendChild(
          entry.type === "single" ? buildQueueCard(entry.item) : buildAlbumCard(entry.id, groups.get(entry.id)),
        );
      }
    }

    queueBody.addEventListener("click", async (event) => {
      const errorButton = event.target.closest("[data-error-id]");
      if (errorButton) {
        const error = errorDetails.get(errorButton.dataset.errorId);
        if (error) openErrorModal(error);
        return;
      }

      const expandButton = event.target.closest("[data-expand-id]");
      if (expandButton) {
        toggleDownload(expandButton.dataset.expandId);
        return;
      }

      const groupExpand = event.target.closest("[data-group-expand]");
      if (groupExpand) {
        toggleDownload(groupExpand.dataset.groupExpand);
        return;
      }

      const groupDelete = event.target.closest("[data-group-delete]");
      if (groupDelete) {
        const gid = groupDelete.dataset.groupDelete;
        const ids = [...queueBody.querySelectorAll(`tr[data-group="${gid}"]`)].map((r) => r.dataset.downloadId);
        if (!ids.length || !window.confirm(`Eliminar el álbum (${ids.length} canciones) de la cola? No se borran archivos.`)) return;
        try {
          for (const id of ids) {
            await fetch(`${API_BASE}/download/${id}`, { method: "DELETE" });
          }
          await loadStatus();
        } catch (error) {
          setMessage(error.message, true);
        }
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) {
        const row = event.target.closest(".queue-row");
        if (row && !event.target.closest("a, button")) {
          toggleDownload(row.dataset.downloadId);
        }
        return;
      }

      performQueueAction(actionButton);
    });

    errorModalClose.addEventListener("click", closeErrorModal);
    errorModal.addEventListener("click", (event) => {
      if (event.target === errorModal) closeErrorModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !errorModal.hidden) closeErrorModal();
    });

    // ---- Navegación entre vistas ----
    const views = ["busqueda", "descargas"];
    const viewTitles = { busqueda: "Búsqueda", descargas: "Descargas" };
    function showView(name) {
      views.forEach((v) => { document.getElementById(`view-${v}`).hidden = v !== name; });
      document.querySelectorAll(".nav-item").forEach((b) => b.classList.toggle("active", b.dataset.view === name));
      document.getElementById("viewTitle").textContent = viewTitles[name];
    }
    document.querySelectorAll(".nav-item").forEach((b) => b.addEventListener("click", () => showView(b.dataset.view)));

    // ---- Badge de cola ----
    function updateQueueBadge() {
      const active = [...queueBody.querySelectorAll(".badge")]
        .filter((b) => b.classList.contains("PENDING") || b.classList.contains("DOWNLOADING") || b.classList.contains("PAUSED")).length;
      const el = document.getElementById("queueBadge");
      el.textContent = active;
      el.classList.toggle("show", active > 0);
    }

    // ---- Búsqueda en Spotify ----
    const searchForm = document.querySelector("#search-form");
    const searchInput = document.querySelector("#search-input");
    const searchButton = document.querySelector("#search-button");
    const searchResults = document.querySelector("#search-results");
    const typeLabelsSearch = { track: "Canción", album: "Álbum" };

    async function catalogAdd(result) {
      const response = await fetch(`${API_BASE}/catalog/add`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(result),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "No se pudo añadir.");
      return data;
    }

    function setSearchMessage(text, isError = false) {
      const el = document.querySelector("#search-message");
      el.textContent = text;
      el.classList.toggle("error", isError);
    }

    function looksLikeSpotifyUrl(text) {
      return /open\.spotify\.com\/|^spotify:/i.test(text);
    }

    async function enqueueUrl(url) {
      const response = await fetch(`${API_BASE}/add`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "No se pudo añadir.");
      return data;
    }

    function buildCard(r) {
      const isAlbum = r.kind === "album";
      const icon = isAlbum ? "💿" : "🎵";
      const card = document.createElement("div");
      card.className = "card";
      const cover = r.image
        ? `<img src="${r.image}" alt="" loading="lazy">`
        : `<div class="cover-ph">${icon}</div>`;
      card.innerHTML = `
        <div class="card-cover">
          ${cover}
          <span class="card-icon" title="${isAlbum ? "Álbum" : "Canción"}">${icon}</span>
        </div>
        <div class="card-body">
          <div class="card-title"></div>
          <div class="card-artist"></div>
        </div>
        <button class="small card-add" type="button" title="Descargar">${DOWNLOAD_SVG}</button>`;
      card.querySelector(".card-title").textContent = r.title || "(sin título)";
      card.querySelector(".card-artist").textContent =
        [r.artist, isAlbum && r.tracks ? `${r.tracks} pistas` : ""].filter(Boolean).join(" · ");
      const btn = card.querySelector(".card-add");
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.title = "Añadiendo...";
        try {
          const data = await catalogAdd(r);
          setSearchMessage(
            isAlbum ? `Encoladas ${data.queued} canciones del álbum.` : `Añadido como descarga #${data.id}.`,
          );
          btn.title = "Añadido";
          btn.innerHTML = CHECK_SVG;
          loadStatus().catch(() => {});
        } catch (e) {
          setSearchMessage(e.message, true);
          btn.disabled = false;
          btn.title = "Descargar";
        }
      });
      return card;
    }

    function buildSection(title, items) {
      const section = document.createElement("div");
      section.className = "results-section";
      const heading = document.createElement("h3");
      heading.className = "results-heading";
      heading.textContent = `${title} (${items.length})`;
      const grid = document.createElement("div");
      grid.className = "grid";
      for (const r of items) grid.appendChild(buildCard(r));
      section.append(heading, grid);
      return section;
    }

    function renderResults(results) {
      searchResults.replaceChildren();
      if (!results.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Sin resultados.";
        searchResults.appendChild(empty);
        return;
      }
      const albums = results.filter((r) => r.kind === "album");
      const tracks = results.filter((r) => r.kind === "track");
      if (albums.length) searchResults.appendChild(buildSection("Álbumes", albums));
      if (tracks.length) searchResults.appendChild(buildSection("Canciones", tracks));
    }

    searchForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      searchButton.disabled = true;
      // Si pegan un enlace de Spotify, se encola directamente (va a Descargas).
      if (looksLikeSpotifyUrl(q)) {
        try {
          const data = await enqueueUrl(q);
          setSearchMessage(`Enlace añadido como descarga #${data.id}. Míralo en Descargas.`);
          searchInput.value = "";
          loadStatus().catch(() => {});
        } catch (e) {
          setSearchMessage(e.message, true);
        } finally {
          searchButton.disabled = false;
        }
        return;
      }
      setSearchMessage("Buscando...");
      try {
        const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "No se pudo buscar.");
        renderResults(data.results || []);
        setSearchMessage((data.results && data.results.length) ? "" : "Sin resultados.");
      } catch (e) {
        setSearchMessage(e.message, true);
      } finally {
        searchButton.disabled = false;
      }
    });

    // ---- Init + polling ----
    async function refreshStatus() {
      await loadStatus();
      updateQueueBadge();
    }
    refreshStatus().catch((error) => setMessage(error.message, true));
    setInterval(() => {
      refreshStatus().catch((error) => setMessage(error.message, true));
    }, 5000);
  </script>
</body>
</html>
